name: CD - Development

on:
  push:
    branches: [development, dev]

# Streamlit Cloud auto-deploys from the dev branch independently.
# To gate deploys: set branch protection on 'dev' to require this workflow's
# status check, and configure a GitHub Environment named 'dev' with required
# reviewers in Settings → Environments.

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/test_integration.py -v --tb=short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
